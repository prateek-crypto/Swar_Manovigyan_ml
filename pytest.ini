[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Mark tests that require TensorFlow
markers =
    tensorflow: tests that require TensorFlow
    audio: tests that require audio processing libraries
filterwarnings =
    # Suppress deprecation noise from third-party libs we don't control
    ignore:.*librosa.beat.tempo.*:FutureWarning
    ignore:.*__array__ implementation doesn't accept a copy keyword.*:DeprecationWarning
